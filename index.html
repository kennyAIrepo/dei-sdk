<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DEI · Live Hand AR</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#000;font-family:'Courier New',monospace}
  #hint{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);
    z-index:30;color:rgba(150,220,255,.7);font-size:11px;letter-spacing:1px;
    background:rgba(0,10,20,.6);padding:8px 18px;border-radius:6px;
    backdrop-filter:blur(8px);pointer-events:none;
    border:1px solid rgba(120,200,255,.15);text-align:center;line-height:1.5;
  }
</style>
</head>
<body>
<!--
  ████████████████████████████████████████████████████████████████
  DEI · LIVE HAND AR + SKETCHFAB
  • Open URL → grant camera → blue ghost hands track in real time
  • Bottom panel: type or speak a request like "give me a basketball"
  • A gallery opens on the right with matching Sketchfab models
  • Wave your hand left/right to scroll alternatives
  • Thumb-up to lock the highlighted one
  • Pinch your fingers to grab + spawn it into the scene
  • Then it's a normal Grabbable: pinch / two-hand-scale / throw / collide
  ████████████████████████████████████████████████████████████████
-->
<div id="hint">
  SAY OR TYPE: "give me a [thing]" → 👋 wave to scroll → 👍 to lock → 🤏 pinch to grab<br>
  THEN: pinch · two-hand-scale · throw · physics
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import { DEI } from './src/dei.js';

await DEI.create({
  handModelUrl: './assets/holo_hands.glb',
  pose: true,
  physics: true,
  voice: { transcribeUrl: '/api/transcribe' },   // proxy on Vercel
  sketchfab: true,                                 // uses /api/sketchfab/* by default
  ui: { title: 'DEI · COMMAND', placeholder: 'try: give me a basketball, an apple, a guitar…' },
});
</script>
</body>
</html>
